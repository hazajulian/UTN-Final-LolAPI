<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/iconLoL2.PNG" />
    <link rel="apple-touch-icon" href="/iconLoL2.PNG" />

    <!-- SEO principal -->
    <title>
      LoL Hub | Campeones, Objetos, Runas y Regiones de League of Legends
    </title>

    <meta
      name="description"
      content="LoL Hub es una wiki fan-made de League of Legends para explorar campeones, objetos, runas, hechizos de invocador y regiones de Runaterra en español e inglés."
    />

    <meta
      name="keywords"
      content="League of Legends, LoL, LoL Hub, campeones LoL, objetos LoL, runas LoL, hechizos de invocador, regiones de Runaterra, champions, items, runes, summoner spells, LoL wiki"
    />

    <meta name="author" content="LoL Hub" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0c0d0f" />

    <!-- Canonical -->
    <link rel="canonical" href="https://lol-hub.lol/" />

    <!-- Open Graph -->
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="LoL Hub" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lol-hub.lol/" />

    <meta
      property="og:title"
      content="LoL Hub | Wiki fan-made de League of Legends"
    />

    <meta
      property="og:description"
      content="Explora campeones, objetos, runas, hechizos de invocador y regiones de League of Legends en una wiki fan-made en español e inglés."
    />

    <meta property="og:image" content="https://lol-hub.lol/iconLoL2.PNG" />
    <meta property="og:image:alt" content="Logo de LoL Hub" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="LoL Hub | Wiki fan-made de League of Legends"
    />

    <meta
      name="twitter:description"
      content="Explora campeones, objetos, runas, hechizos de invocador y regiones de League of Legends."
    />

    <meta name="twitter:image" content="https://lol-hub.lol/iconLoL2.PNG" />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <!-- Datos estructurados -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "LoL Hub",
        "url": "https://lol-hub.lol/",
        "description": "Wiki fan-made de League of Legends para explorar campeones, objetos, runas, hechizos de invocador y regiones de Runaterra.",
        "inLanguage": ["es", "en"],
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://lol-hub.lol/champions?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "LoL Hub",
        "url": "https://lol-hub.lol/",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "description": "Herramienta y wiki fan-made de League of Legends para consultar campeones, objetos, runas, hechizos de invocador y regiones."
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
